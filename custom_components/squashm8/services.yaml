run:
  name: Run SquashM8 sync
  description: Fetch SquashM8 messages, then send/edit/delete via Whatsapper notify API.
  fields:
    entry_id:
      name: Config entry ID
      description: Select a specific SquashM8 config entry when multiple exist.
      required: false
      selector:
        text:
    peek:
      name: Peek
      description: Request preview/no-post mode from SquashM8 endpoint.
      required: false
      default: false
      selector:
        boolean:
    delta:
      name: Delta only
      description: When enabled, only process entries whose upstream "update" field indicates change; when disabled, process all entries.
      required: false
      default: true
      selector:
        boolean:
    override_target:
      name: Override target group
      description: Forward all generated messages to this logical target name.
      required: false
      selector:
        text:
    ts:
      name: Timestamp override
      description: Optional epoch timestamp override for replay/testing.
      required: false
      selector:
        number:
          min: 0
          mode: box
    dry_run:
      name: Dry run
      description: Simulate send/edit/delete behavior without mutating external services.
      required: false
      default: false
      selector:
        boolean:
