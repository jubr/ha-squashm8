name: Auto Version Bump

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Determine bump type from PR title
        id: bump-type
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          bump_type="patch"
          if [[ "$PR_TITLE" == *"MINOR"* ]]; then
            bump_type="minor"
          fi
          echo "bump_type=$bump_type" >> "$GITHUB_OUTPUT"

      - name: Bump integration version
        id: bump-version
        run: |
          new_version=$(python3 .github/scripts/bump_manifest_version.py \
            --manifest custom_components/squashm8/manifest.json \
            --bump "${{ steps.bump-type.outputs.bump_type }}" \
            --start-version "0.0.1")
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, and push version bump
        id: commit-tag
        run: |
          if git diff --quiet; then
            echo "No version changes detected."
            echo "tag_name=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add custom_components/squashm8/manifest.json
          git commit -m "chore: bump version to ${{ steps.bump-version.outputs.new_version }} [skip ci]"
          tag_name="v${{ steps.bump-version.outputs.new_version }}"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag_name}" >/dev/null 2>&1; then
            echo "Tag ${tag_name} already exists on origin."
            exit 1
          fi

          git tag -a "${tag_name}" -m "Release ${tag_name}"
          git push origin HEAD:main "${tag_name}"

      - name: Publish GitHub release
        if: steps.commit-tag.outputs.tag_name != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.commit-tag.outputs.tag_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists."
            exit 0
          fi

          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes
